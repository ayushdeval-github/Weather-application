<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — WeatherIN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #0d9488 0%, #14b8a6 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .auth-container {
      background: white;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
      width: 100%;
      max-width: 420px;
      padding: 40px;
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-icon { font-size: 48px; }
    .logo-text {
      font-size: 24px;
      font-weight: 700;
      background: linear-gradient(135deg, #14b8a6, #10b981);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-top: 8px;
    }
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
      border-bottom: 2px solid #e2e8f0;
    }
    .tab-btn {
      flex: 1;
      background: none;
      border: none;
      padding: 12px;
      font-size: 15px;
      font-weight: 600;
      color: #94a3b8;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      transition: all 0.2s;
      font-family: inherit;
    }
    .tab-btn.active {
      color: #0d9488;
      border-bottom-color: #0d9488;
    }
    .form-panel {
      display: none;
    }
    .form-panel.active {
      display: block;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: #475569;
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-input:focus {
      outline: none;
      border-color: #0d9488;
      box-shadow: 0 0 0 3px rgba(13,148,136,0.1);
    }
    .submit-btn {
      width: 100%;
      background: #0d9488;
      border: none;
      border-radius: 8px;
      padding: 14px;
      color: white;
      font-size: 15px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }
    .submit-btn:hover {
      background: #14b8a6;
      transform: translateY(-1px);
    }
    .submit-btn:disabled {
      background: #94a3b8;
      cursor: not-allowed;
      transform: none;
    }
    .error-msg {
      background: #fee2e2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 12px;
      color: #dc2626;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .error-msg.show {
      display: block;
    }
    .success-msg {
      background: #d1fae5;
      border: 1px solid #a7f3d0;
      border-radius: 8px;
      padding: 12px;
      color: #059669;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }
    .success-msg.show {
      display: block;
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="logo">
      <div class="logo-icon">🌤</div>
      <div class="logo-text">WeatherIN</div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="login">Login</button>
      <button class="tab-btn" data-tab="signup">Sign Up</button>
    </div>

    <div id="error-msg" class="error-msg"></div>
    <div id="success-msg" class="success-msg"></div>

    <!-- LOGIN FORM -->
    <div class="form-panel active" id="login-panel">
      <form id="login-form">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="login-email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="login-password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="submit-btn" id="login-btn">Login</button>
      </form>
    </div>

    <!-- SIGNUP FORM -->
    <div class="form-panel" id="signup-panel">
      <form id="signup-form">
        <div class="form-group">
          <label class="form-label">Name</label>
          <input type="text" class="form-input" id="signup-name" placeholder="Your name" required />
        </div>
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="signup-email" placeholder="you@example.com" required />
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="signup-password" placeholder="••••••••" minlength="6" required />
        </div>
        <button type="submit" class="submit-btn" id="signup-btn">Create Account</button>
      </form>
    </div>

  </div>

  <script>
    (function () {
      'use strict';

      const errorMsg = document.getElementById('error-msg');
      const successMsg = document.getElementById('success-msg');

      function showError(msg) {
        errorMsg.textContent = msg;
        errorMsg.classList.add('show');
        successMsg.classList.remove('show');
      }

      function showSuccess(msg) {
        successMsg.textContent = msg;
        successMsg.classList.add('show');
        errorMsg.classList.remove('show');
      }

      function hideMessages() {
        errorMsg.classList.remove('show');
        successMsg.classList.remove('show');
      }

      // Tab switching
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
          document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
          btn.classList.add('active');
          document.getElementById(btn.dataset.tab + '-panel').classList.add('active');
          hideMessages();
        });
      });

      // LOGIN
      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        hideMessages();
        const email = document.getElementById('login-email').value.trim();
        const password = document.getElementById('login-password').value;
        const btn = document.getElementById('login-btn');

        btn.disabled = true;
        btn.textContent = 'Logging in...';

        try {
          const res = await fetch('/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
          });
          const data = await res.json();

          if (!res.ok) throw new Error(data.error || data.message || 'Login failed');

          localStorage.setItem('weatherin_token', data.token);
          localStorage.setItem('weatherin_user', JSON.stringify(data.user));
          showSuccess('Login successful! Redirecting...');
          setTimeout(() => { window.location.href = '/'; }, 1000);
        } catch (err) {
          showError(err.message);
        } finally {
          btn.disabled = false;
          btn.textContent = 'Login';
        }
      });

      // SIGNUP
      document.getElementById('signup-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        hideMessages();
        const name = document.getElementById('signup-name').value.trim();
        const email = document.getElementById('signup-email').value.trim();
        const password = document.getElementById('signup-password').value;
        const btn = document.getElementById('signup-btn');

        btn.disabled = true;
        btn.textContent = 'Creating account...';

        try {
          const res = await fetch('/api/auth/signup', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name, email, password })
          });
          const data = await res.json();

          if (!res.ok) throw new Error(data.error || data.message || 'Signup failed');

          localStorage.setItem('weatherin_token', data.token);
          localStorage.setItem('weatherin_user', JSON.stringify(data.user));
          showSuccess('Account created! Redirecting...');
          setTimeout(() => { window.location.href = '/'; }, 1000);
        } catch (err) {
          showError(err.message);
        } finally {
          btn.disabled = false;
          btn.textContent = 'Create Account';
        }
      });

    })();
  </script>

</body>
</html>
